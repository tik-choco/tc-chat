<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <!-- viewport-fit=cover lets the app paint under the notch/home indicator;
         the layout compensates with env(safe-area-inset-*). Zoom is left
         enabled for accessibility. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="TC Chat — a peer-to-peer chat, board, voice & screen-share space for the tik-choco suite." />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#f6f7f9" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0d0e12" media="(prefers-color-scheme: dark)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="TC Chat" />
    <title>TC Chat</title>
    <!-- Apply the saved theme before first paint to avoid a flash of the wrong
         theme (FOUC). Mirrors useTheme(): the choice is stored as a raw
         "light"/"dark" string under tc-chat:theme; default is light. -->
    <script>
      (function () {
        try {
          if (localStorage.getItem('tc-chat:theme') === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
